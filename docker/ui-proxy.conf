# Reach the Lightngx management UI (127.0.0.1:9000) from the local network.
# Seeded once if absent; edit freely — it is never re-seeded or clobbered.
#
# Publish the port and browse http://<host>:9001 from your LAN. Over plain
# HTTP set LN_SECURE_COOKIES=false, or login loops (the session cookie is
# Secure-flagged). Better: terminate TLS in a vhost in front and proxy_pass
# to http://127.0.0.1:9000 with these headers, keeping LN_SECURE_COOKIES=true.

# Preserve an outer proxy's X-Forwarded-Proto/Host if it set them (TLS
# terminated in front); otherwise derive from this request.
map $http_x_forwarded_proto $lngx_fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}
map $http_x_forwarded_host $lngx_fwd_host {
    default $http_x_forwarded_host;
    ''      $http_host;
}

server {
    listen 9001;

    # local networks only
    allow 127.0.0.0/8;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny  all;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $lngx_fwd_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $lngx_fwd_proto;
        proxy_buffering off;              # live log stream (SSE)
        proxy_read_timeout 1h;
    }
}
