# Docker-only: the CrowdSec bouncer reaches LAPI/AppSec through the lua
# cosocket client (lua-resty-http), which — unlike proxy_pass — ignores
# /etc/resolv.conf and resolves hostnames only via this `resolver`
# directive. Required to look up a `crowdsec` service name over the
# compose network (docker embedded DNS). Talking to LAPI by literal IP?
# Then this file is unnecessary.
resolver 127.0.0.11 ipv6=off;
