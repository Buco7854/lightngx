# Example: expose the UI over HTTPS. Copy into conf.d, set the domain and
# certificate paths, then reload. Keep LN_SECURE_COOKIES=true. For a public
# host add an auth gate too (see example/hardened).

# Keep an outer proxy's X-Forwarded-Proto if set, else derive it.
map $http_x_forwarded_proto $lngx_fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 443 ssl;
    http2 on;
    server_name lightngx.example.com;

    ssl_certificate     /etc/ssl/domains/lightngx.example.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/domains/lightngx.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $lngx_fwd_proto;
        proxy_buffering off;              # live log stream (SSE)
        proxy_read_timeout 1h;
    }
}
