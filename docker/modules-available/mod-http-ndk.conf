# ngx_devel_kit (NDK), compiled into this image against the exact nginx
# it ships (Debian's libnginx-mod-http-ndk targets Debian's older nginx
# and would be version-rejected). Symlinked from modules-enabled with a
# 10- prefix: NDK must load before lua. Absolute path so a bind-mounted
# /etc/nginx cannot shadow the module location.
load_module /usr/lib/nginx/modules/ndk_http_module.so;
