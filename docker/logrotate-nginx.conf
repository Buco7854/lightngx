# nginx log rotation. The lightngx supervisor runs `logrotate` on a timer
# (there is no cron in the image); this file defines the policy.
/var/log/nginx/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 "$(cat /var/run/nginx.pid)" || true
    endscript
}
